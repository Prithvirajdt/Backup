name: Update Jio Playlist

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */2 * * *'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare sources folder
        run: mkdir -p sources

      - name: Download Jio playlist
        env:
          SRC_JTV: ${{ secrets.SRC_JTV }}
        run: |
          set -e
          if [ -z "$SRC_JTV" ]; then
            echo "ERROR: SRC_JTV secret is not set"
            exit 1
          fi
          wget -q -O sources/jai_raw.m3u "$SRC_JTV"

      - name: Clean playlist
        run: |
          {
            echo "#EXTM3U"
            echo

            awk '
            BEGIN { IGNORECASE=1; keep=0 }

            function is_blocked(line) {
              return (line ~ /tamil|telugu|kannada|bangla|malayalam|test|wow|swayam|sathee/)
            }

            function is_allowed_news(line) {
              return (line ~ /zee|aaj tak|ndtv|india|today|cnn|cnbc|abp|republic|wion|dd/)
            }

            function fix_group_titles(line) {
              if (match(line, /group-title="[^"]*"/)) {
                gt = substr(line, RSTART, RLENGTH)

                if (gt ~ /Marathi/) sub(/group-title="[^"]*"/, "group-title=\"Entertainment\"", line)
                else if (gt ~ /English/) sub(/group-title="[^"]*"/, "group-title=\"Movies\"", line)
                else if (gt ~ /Knowledge/) sub(/group-title="[^"]*"/, "group-title=\"Infotainment\"", line)
                else if (gt ~ /Education/) sub(/group-title="[^"]*"/, "group-title=\"Educational\"", line)
              }
              return line
            }

            function custom_group_edit(line) {
              # 🔥 FORCE Sony BBC Earth → Infotainment
              if (tolower(line) ~ /sony bbc earth/) {
                gsub(/group-title="[^"]*"/, "group-title=\"Infotainment\"", line)
              }
              return line
            }

            /^#EXTINF/ {

              $0 = fix_group_titles($0)
              $0 = custom_group_edit($0)

              is_news = ($0 ~ /group-title="News"/ || $0 ~ /group-title="Business News"/)

              if (is_news) {
                if (!is_blocked($0) && is_allowed_news($0)) {
                  keep=1
                  sub(/group-title="Business News"/, "group-title=\"News\"", $0)
                  print
                } else {
                  keep=0
                }
                next
              }

              if (is_blocked($0)) {
                keep=0
              } else {
                keep=1
                print
              }
              next
            }

            { if (keep==1) print }

            ' sources/jai_raw.m3u

          } > sources/jai_clean.m3u


      # ✅ NEW STEP: STRICT DEDUP (FIX YOUR ISSUE)
      - name: Deduplicate channels (correct way)
        run: |
          awk '
          /^#EXTINF/ {
            line=$0

            name=line
            sub(/.*?,/, "", name)

            key=tolower(name)
            gsub(/^[ \t]+|[ \t]+$/, "", key)

            if (!(key in seen)) {
              seen[key]=1
              keep=1
              print line
            } else {
              keep=0
            }
            next
          }

          keep { print }

          ' sources/jai_clean.m3u > sources/jai.vxn

          rm -f sources/jai_clean.m3u sources/jai_raw.m3u


      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add sources/jai.vxn
          git commit -m "Update Jio playlist (jai.vxn)" || echo "No changes"
          git push
