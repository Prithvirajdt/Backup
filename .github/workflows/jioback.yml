name: Update jioback Playlist

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */2 * * *'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ============================================
      # STEP 1: CHECKOUT REPOSITORY
      # ============================================
      - name: Checkout repository
        uses: actions/checkout@v4

      # ============================================
      # STEP 2: PREPARE WORKING DIRECTORY
      # ============================================
      - name: Prepare sources folder
        run: mkdir -p sources

      # ============================================
      # STEP 3: DOWNLOAD SOURCE PLAYLIST
      # ============================================
      - name: Download JTVBACK source
        env:
          SRC_JTVBACK: ${{ secrets.SRC_JTVBACK }}
        run: |
          wget -q -O sources/jtvback_source.m3u "$SRC_JTVBACK"

      # ============================================
      # STEP 4: CLEAN + FILTER PLAYLIST
      # ============================================
      - name: Clean playlist
        run: |
          {
            echo "#EXTM3U"
            echo

            awk '
            BEGIN { IGNORECASE=1; keep=0 }

            # ----------------------------------------
            # BLOCK LIST FUNCTION
            # ----------------------------------------
            function is_blocked(line) {
              return (line ~ /tamil|telugu|kannada|bangla|malayalam|test|wow|swayam|sathee|ap-|yadagiri|vidya|gujarat|bengali|asianet|maa|ptc|vijay|etv|aath|rongeen|raj|punjab|manorama|mahaa|jaya|gemini|udaya|salaam|surya|adithya|Cartoon Network Hindi$|amrita|colors super$|arunprabha|girnar|kashir|oriya|saptagiri|urdu|podhigai|desi c|desi n|desika|kairali|jalsha|studio|apex|flower|jonack|kalaignar|makkal|may|mk|moon|nakshatra|bangalore|peppers|polimer|puthu|sanjha|sidharth|spondon|kiran|sun tv|sundrani|suvarna|thanthi|vaanavil|vasanth|vendhar|vissa|jomjomat|j movies|ktv|maha|mahua|pitaara|public m|sun life|tabbar|thalaa|e 24$|chintu|chutti|kochu|kushi|naap|east|sun music|sun news|nick junior|sonic marathi$|rang|sristi|teh|4 tv|6 tv|10 tv|99 tv|ananda|asmita|ganga|abc|abn|chanakya|harya|mp|ghanta|kalak|jhar|nepal|taiwan|karn|kera|bihar|mh|pradesh|him|goman|kau|logy|uk|svbc|news up|bhoj|balle|7x|kappa|record|only|oye|rs bh|dhenu|tune|angel|bhakti tv|calvary|win|divya v|dharmam|gurk|nambikkai|mercy|goodness|jothi|madha|powervision|shalom|ayush|vanitha|jio e|jio s|jiog|cvr|kite|hhdl|grace|aradh|bhawan|adhyatam|atma|subhav|om tv|subhsandesh|shubhsan|prabhu sandesh|harvest|medha|ptd|gyanv|set sd|fakt|oscar|k mar|+ mar|go mar|aarya|zb|thirai|ee power|cinemalu|roja|amar d|channel vision|captain$|brio|friends tv|kannur|tank|sana tv|sana plus|jio home|bhakthi siri|bvtv|gospel|hosanna|prar|popli|loveworld|t sat|sanjh|malanadu|purnima|janapriyam|sarthak|steelbird|sikh|peace music|alankar|centa|icmai|book|stingray|sony|set|dangal/)
            }

            # ----------------------------------------
            # NEWS ALLOW LIST FUNCTION
            # ----------------------------------------
            function is_allowed_news(line) {
              return (line ~ /zee|aaj tak|ndtv|india|today|cnn|cnbc|abp|top|euro|asia|republic|wion|bharat|dd|sansad|lok|nation|firstpost|now/)
            }

            # ----------------------------------------
            # FIX GROUP-TITLE FIRST
            # ----------------------------------------
            function fix_group_titles(line) {
              if (match(line, /group-title="[^"]*"/)) {
                gt = substr(line, RSTART, RLENGTH)

                if (gt ~ /Marathi/) {
                  sub(/group-title="[^"]*"/, "group-title=\"Entertainment\"", line)
                }
                else if (gt ~ /English/) {
                  sub(/group-title="[^"]*"/, "group-title=\"Movies\"", line)
                }
                else if (gt ~ /Knowledge/) {
                  sub(/group-title="[^"]*"/, "group-title=\"Infotainment\"", line)
                }
                else if (gt ~ /Education/) {
                  sub(/group-title="[^"]*"/, "group-title=\"Educational\"", line)
                }
              }
              return line
            }

            # ----------------------------------------
            # DEMO BLOCK
            # ----------------------------------------
            function custom_group_edit(line) {
              # Example:
              # if (line ~ /Star Sports/) {
              #   sub(/group-title="[^"]*"/, "group-title=\"Premium Sports\"", line)
              # }
              return line
            }

            # ----------------------------------------
            # MAIN PROCESSING (FIX APPLIED FIRST)
            # ----------------------------------------
            /^#EXTINF/ {

              # APPLY FIX FIRST
              $0 = fix_group_titles($0)
              $0 = custom_group_edit($0)

              is_news = ($0 ~ /group-title="News"/ || $0 ~ /group-title="Business News"/)

              if (is_news) {
                if (!is_blocked($0) && is_allowed_news($0)) {
                  keep=1
                  sub(/group-title="Business News"/, "group-title=\"News\"", $0)
                  print
                } else {
                  keep=0
                }
                next
              }

              if (is_blocked($0)) {
                keep=0
              } else {
                keep=1
                print
              }
              next
            }

            { if (keep==1) print }

            ' sources/jai_raw.m3u

          } > sources/jaiback.vxn

          rm -f sources/jai_raw.m3u

      # ============================================
      # STEP 5: COMMIT & PUSH
      # ============================================
      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add sources/jaiback.vxn
          git commit -m "Update Jio playlist (jaiback.vxn)" || echo "No changes"
          git push
